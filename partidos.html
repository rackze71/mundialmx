<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partidos - MundialMX</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-futbol me-2"></i>Mundial<span class="text-warning">MX</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link active" href="partidos.html">Partidos</a></li>
                    <li class="nav-item"><a class="nav-link" href="mis-boletos.html">Mis Boletos</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="page-header">
        <div class="container">
            <h1>Todos los Partidos</h1>
            <p>Encuentra el partido perfecto para ti</p>
        </div>
    </section>

    <section class="matches-section">
        <div class="container">
            <!-- Filtros -->
            <div class="filters-bar">
                <div class="filter-group">
                    <label><i class="fas fa-layer-group me-2"></i>Fase</label>
                    <select id="filterFase" class="form-select">
                        <option value="todas">Todas</option>
                        <option value="grupos">Fase de Grupos</option>
                        <option value="octavos">Octavos de Final</option>
                        <option value="cuartos">Cuartos de Final</option>
                        <option value="semifinales">Semifinales</option>
                        <option value="tercer">Tercer Lugar</option>
                        <option value="final">Final</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label><i class="fas fa-map-marker-alt me-2"></i>País Sede</label>
                    <select id="filterSede" class="form-select">
                        <option value="todas">Todos</option>
                        <option value="mexico">🇲🇽 México</option>
                        <option value="usa">🇺🇸 Estados Unidos</option>
                        <option value="canada">🇨🇦 Canadá</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label><i class="fas fa-sort-amount-down me-2"></i>Ordenar</label>
                    <select id="filterOrden" class="form-select">
                        <option value="fecha">Fecha (más cercano)</option>
                        <option value="precio-asc">Precio (menor a mayor)</option>
                        <option value="precio-desc">Precio (mayor a menor)</option>
                    </select>
                </div>
                <button class="btn-clear" onclick="clearFilters()">
                    <i class="fas fa-times me-2"></i>Limpiar
                </button>
            </div>

            <div class="matches-count" id="matchesCount"></div>
            <div class="matches-grid" id="matchesList"></div>
        </div>
    </section>

    <footer>
        <div class="container text-center">
            <p class="mb-0">&copy; 2026 MundialMX - Proyecto Escolar</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderTodosLosPartidos(partidos);
            configurarFiltros();
        });
    </script>
</body>
</html>
